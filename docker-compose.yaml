services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Back-End/SQL/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: authdb
      TZ: Asia/Manila
      PGTZ: Asia/Manila

volumes:
  postgres_data:
